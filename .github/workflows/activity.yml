name: Daily Activity

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README
        run: python src/update_readme.py

      - name: Generate Statistics
        run: python src/generate_stats.py

      - name: Generate Changelog
        run: python src/changelog_generator.py || echo "Git repo not fully configured or no commits"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "action@github.com"

          # Ensure authenticated push URL (uses built-in token)
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Fetch remote and rebase local branch to avoid non-fast-forward
          git fetch --prune origin master
          git rebase origin/master || (git rebase --abort && git pull --rebase origin master)

          git add .
          # commit only if there are changes; don't abort the step if nothing to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: automated update"
          fi

          # Push (fast-forward)
          git push origin HEAD:master
